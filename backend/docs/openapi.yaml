  # ----------------------------------------------------------
  /dashboard/my-dashboard:
    get:
      tags: [Dashboard]
      summary: Current employee's personal dashboard
      responses:
        '200':
          description: Employee dashboard data

  /dashboard/manager-dashboard:
    get:
      tags: [Dashboard]
      summary: Manager team dashboard
      responses:
        '200':
          description: Team KPIs and member summaries

  /dashboard/hr-dashboard:
    get:
      tags: [Dashboard]
      summary: HR overview dashboard
      responses:
        '200':
          description: HR-wide metrics

  /dashboard/admin-dashboard:
    get:
      tags: [Dashboard]
      summary: Admin system dashboard
      responses:
        '200':
          description: System health, sync status, user stats

  # ----------------------------------------------------------
  # Reports
  # ----------------------------------------------------------
  /reports/employee-summary:
    get:
      tags: [Reports]
      summary: Employee list report
      parameters:
        - in: query
          name: department
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            default: Active
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: per_page
          schema:
            type: integer
            maximum: 200
      responses:
        '200':
          description: Paginated employee report

  /reports/org-structure:
    get:
      tags: [Reports]
      summary: Org structure report grouped by department
      parameters:
        - in: query
          name: department
          schema:
            type: string
      responses:
        '200':
          description: Org structure report

  /reports/performance:
    get:
      tags: [Reports]
      summary: Performance reviews report
      parameters:
        - in: query
          name: period
          schema:
            type: string
        - in: query
          name: department
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Performance report with avg rating summary

  /reports/training:
    get:
      tags: [Reports]
      summary: Training enrollment and completion report
      parameters:
        - in: query
          name: department
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [Enrolled, In Progress, Completed, Dropped]
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
