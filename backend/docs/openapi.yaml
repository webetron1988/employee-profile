        - in: query
          name: location
          schema:
            type: string
      responses:
        '200':
          description: Headcount breakdown with summary totals

  # ----------------------------------------------------------
  # Admin
  # ----------------------------------------------------------
  /admin/employees:
    get:
      tags: [Admin]
      summary: List all employees (paginated + filterable)
      parameters:
        - in: query
          name: department
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Employee list
    post:
      tags: [Admin]
      summary: Create employee
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
      responses:
        '201':
          description: Employee created
        '422':
          description: Validation error

  /admin/employees/{id}:
    put:
      tags: [Admin]
      summary: Update employee
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Admin]
      summary: Soft-delete employee
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Employee deactivated

  /admin/sync/employees:
    post:
      tags: [Admin]
      summary: Trigger HRMS employee sync
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [full, incremental]
                  default: incremental
      responses:
        '200':
          description: Sync initiated

  /admin/sync/status:
    get:
      tags: [Admin]
      summary: Get latest sync status
      responses:
        '200':
          description: Sync status

  /admin/audit-logs:
    get:
      tags: [Admin]
      summary: Get audit logs (paginated + filterable)
      parameters:
        - in: query
          name: module
          schema:
            type: string
        - in: query
          name: user_id
          schema:
            type: integer
        - in: query
          name: from_date
          schema:
            type: string
            format: date
        - in: query
          name: to_date
          schema:
            type: string
            format: date
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Audit log entries

  /admin/configuration:
    get:
      tags: [Admin]
      summary: Get system configuration
      responses:
        '200':
          description: All configuration key-value pairs

  /admin/configuration/{key}:
    put:
      tags: [Admin]
      summary: Update a configuration value
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
          example: performance.rating_scale
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
      responses:
        '200':
          description: Configuration updated

  # ----------------------------------------------------------
  # Docs (Public)
  # ----------------------------------------------------------
  /docs:
    get:
      tags: [Docs]
      summary: API documentation index
      security: []
      responses:
        '200':
          description: Module overview and links

  /docs/api:
    get:
      tags: [Docs]
      summary: Authentication documentation
      security: []
      responses:
        '200':
          description: Auth flow, roles, response format, HTTP codes

  /docs/endpoints:
    get:
      tags: [Docs]
      summary: Full endpoint reference
      security: []
      responses:
        '200':
          description: All endpoints grouped by module
