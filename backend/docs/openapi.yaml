  /analytics/department-stats:
    get:
      tags: [Analytics]
      summary: Department headcount and employment-type breakdown
      responses:
        '200':
          description: Department statistics

  /analytics/performance-summary:
    get:
      tags: [Analytics]
      summary: Performance rating summary
      responses:
        '200':
          description: Avg rating, distribution, pending reviews

  /analytics/skill-inventory:
    get:
      tags: [Analytics]
      summary: Skill catalog and proficiency distribution
      responses:
        '200':
          description: Skill inventory

  /analytics/competency-matrix:
    get:
      tags: [Analytics]
      summary: Competency assessment heatmap (gap detection)
      responses:
        '200':
          description: Competency matrix

  /analytics/training-stats:
    get:
      tags: [Analytics]
      summary: Training enrollment and completion rates
      responses:
        '200':
          description: Training statistics

  /analytics/course-effectiveness:
    get:
      tags: [Analytics]
      summary: Course pass rates and scores
      responses:
        '200':
          description: Course effectiveness

  /analytics/hr-dashboard:
    get:
      tags: [Analytics]
      summary: HR overview metrics
      responses:
        '200':
          description: HR KPIs

  /analytics/employee-engagement:
    get:
      tags: [Analytics]
      summary: Employee engagement rates
      responses:
        '200':
          description: Engagement metrics

  # ----------------------------------------------------------
